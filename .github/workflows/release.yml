name: Create Release Zip

on:
  release:
    types: [published] # GitHubでReleaseを公開した時に作動

jobs:
  release-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Releaseにファイルをアップロードするための権限

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: パッケージ用Zipの作成
        run: |
          # タグ名（例: v0.2.0）を使ってZipファイル名を決定
          ZIP_NAME="JustTimeShader-${{ github.event.release.tag_name }}.zip"
          
          # .gitや.githubなど、動作に不要なファイルを除外してZip化
          zip -r $ZIP_NAME . -x "*.git*" ".github/*" "*.unitypackage" "README.md" "LICENSE"
          
          # 次のステップにファイル名を渡す
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Releaseへアップロード
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ env.ZIP_NAME }}