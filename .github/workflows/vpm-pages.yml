name: Build and Deploy VPM Repo

on:
  release:
    types: [published] # Release公開時に実行

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-vpm:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: VPM用 index.json の生成
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error

          repo = os.environ['GITHUB_REPOSITORY']
          owner, repo_name = repo.split('/')
          tag = os.environ.get('GITHUB_REF_NAME') or os.environ['GITHUB_EVENT_RELEASE_TAG_NAME']

          pages_url = f'https://{owner}.github.io/{repo_name}/index.json'

          with open('package.json', 'r', encoding='utf-8') as f:
              pkg = json.load(f)

          asset_name = f"{pkg['name'].replace('.', '-')}-{tag}.zip"
          zip_url = f'https://github.com/{repo}/releases/download/{tag}/{asset_name}'

          pkg['url'] = zip_url

          try:
              with urllib.request.urlopen(pages_url) as resp:
                  existing_repo = json.load(resp)
          except (urllib.error.HTTPError, urllib.error.URLError, json.JSONDecodeError):
              existing_repo = {
                  'name': f'{owner} VPM Repository',
                  'id': f'com.{owner}.vpm',
                  'url': pages_url,
                  'author': owner,
                  'packages': {}
              }

          existing_repo.setdefault('name', f'{owner} VPM Repository')
          existing_repo.setdefault('id', f'com.{owner}.vpm')
          existing_repo.setdefault('url', pages_url)
          existing_repo.setdefault('author', owner)
          existing_repo.setdefault('packages', {})

          package_entry = existing_repo['packages'].setdefault(pkg['name'], {'versions': {}})
          package_entry.setdefault('versions', {})
          package_entry['versions'][pkg['version']] = pkg

          os.makedirs('public', exist_ok=True)
          with open('public/index.json', 'w', encoding='utf-8') as f:
              json.dump(existing_repo, f, indent=2, ensure_ascii=False)
          PY

      - name: GitHub Pagesの設定
        uses: actions/configure-pages@v5

      - name: Pagesへのアップロード準備
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: GitHub Pagesへデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
