<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustTimeShader VCC Repository</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #5b6472;
            --accent: #0f766e;
            --accent-hover: #115e59;
            --border: #d9e2ec;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
            background:
                radial-gradient(circle at top, #d9f3ef 0%, transparent 36%),
                linear-gradient(180deg, var(--bg) 0%, #eef3f8 100%);
            color: var(--text);
        }

        main {
            width: min(100%, 680px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
        }

        p {
            margin: 0;
            line-height: 1.7;
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .button.primary {
            background: var(--accent);
            color: #fff;
        }

        .button.primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .button.secondary {
            border-color: var(--border);
            color: var(--text);
            background: #fff;
        }

        .button.secondary:hover {
            border-color: #b7c5d6;
            transform: translateY(-1px);
        }

        code {
            display: inline-block;
            margin-top: 18px;
            padding: 6px 10px;
            border-radius: 10px;
            background: #f8fafc;
            border: 1px solid var(--border);
            color: #0f172a;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <main>
        <h1>JustTimeShader を VCC に追加します</h1>
        <p id="status">VRChat Creator Companion が起動していれば、自動でリポジトリ追加画面を開きます。反応しない場合は、下のボタンから手動で追加してください。</p>

        <div class="actions">
            <a id="add-repo" class="button primary" href="vcc://vpm/addRepo?url=https://rimelate.github.io/JustTimeShader/index.json">VCC に追加</a>
            <a class="button secondary" href="https://github.com/rimelate/JustTimeShader/releases">Releases を開く</a>
        </div>

        <code>https://rimelate.github.io/JustTimeShader/index.json</code>
    </main>

    <script>
        window.addEventListener("load", function () {
            const addRepoLink = document.getElementById("add-repo");

            setTimeout(function () {
                window.location.href = addRepoLink.href;
            }, 150);
        });
    </script>
</body>
</html>
